<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Sites | RiskFreeSites</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root{--sand:#faf9f6;--border:#e4e2dc;--text:#1a1918;--text-2:#4a4a52;--text-3:#78787f;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',-apple-system,sans-serif;background:var(--sand);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  </style>
</head>
<body>
  <div style="text-align:center;max-width:400px;">
    <a href="/"><img src="/logo.png" alt="RiskFreeSites" style="height:28px;width:auto;margin-bottom:32px;" /></a>
    <h1 style="font-size:1.5rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:12px;">Demo Sites</h1>
    <p style="font-size:0.95rem;color:var(--text-2);line-height:1.7;">Demo sites will appear here. Each client gets a unique link at <code style="background:#fff;border:1px solid var(--border);padding:2px 6px;border-radius:4px;font-size:0.85rem;">/demo/your-business-name/</code></p>
  </div>
</body>
</html>
